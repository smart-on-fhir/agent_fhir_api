AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SAM template for the FHIR Sandbox API.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedPattern: '[A-Za-z0-9-]+'
    Description: Deployment environment name (for example dev or prod).
  FHIRSourceBucket:
    Type: String
    Description: S3 bucket where the Lambda loads FHIR data from.
  WafArn:
    Type: String
    Description: AWS WAF (Firewall) resource id. Ex arn:aws:wafv2:us-east-1:123456789012:regional/webacl/my-existing-waf/abc12345-d123-ef45-6789-abcdef123456

Resources:
  FhirDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub fhir-sandbox-${Environment}-${AWS::AccountId}

  FhirApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Sub ${Environment}
      Auth:
        DefaultAuthorizer: NONE
      EndpointConfiguration:
        Type: REGIONAL
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'

  FhirApiWafAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}::/restapis/${FhirApi}/stages/${Environment}
      WebACLArn: !Ref WafArn

  FhirFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub fhir-sandbox-${Environment}
      Runtime: python3.14
      Handler: lambda_fn.lambda_handler
      CodeUri: api_src/
      MemorySize: 3600 # This should get us 2 cores
      EphemeralStorage:
        Size: 10240
      Timeout: 30
      Environment:
        Variables:
          SOURCE_BUCKET: !Ref FHIRSourceBucket
          HOME: /tmp/
      Policies:
        - S3ReadPolicy:
            BucketName: !Sub fhir-sandbox-${Environment}-${AWS::AccountId}
        - Statement:
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: '*'
      Events:
        FhirRoute:
          Type: Api
          Properties:
            RestApiId: !Ref FhirApi
            Path: /{cohort_id}/fhir/{fhir_resource}
            Method: POST
        FhirCountRoute:
          Type: Api
          Properties:
            RestApiId: !Ref FhirApi
            Path: /{cohort_id}/fhir/{fhir_resource}/count
            Method: POST

  ConverterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub fhir-sandbox-${Environment}-converter
      Runtime: python3.14
      Handler: lambda_fn.lambda_handler
      CodeUri: convert_src/
      MemorySize: 3600
      EphemeralStorage:
        Size: 10240
      Timeout: 900
      Environment:
        Variables:
          HOME: /tmp/
      Policies:
        - S3ReadPolicy:
            BucketName: !Sub fhir-sandbox-${Environment}-${AWS::AccountId}
        - S3WritePolicy:
            BucketName: !Sub fhir-sandbox-${Environment}-${AWS::AccountId}
        - Statement:
            - Effect: Allow
              Action:
                - s3:DeleteObject
              Resource: !Sub arn:${AWS::Partition}:s3:::fhir-sandbox-${Environment}-${AWS::AccountId}/*
      Events:
        S3CreateNdjson:
          Type: S3
          Properties:
            Bucket: !Ref FhirDataBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: suffix
                    Value: .ndjson
