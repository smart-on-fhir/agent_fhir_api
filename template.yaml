AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SAM template for the FHIR Sandbox API.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedPattern: '[A-Za-z0-9-]+'
    Description: Deployment environment name (for example dev or prod).
  FHIRSourceBucket:
    Type: String
    Description: S3 bucket where the Lambda loads FHIR data from.
  AthenaDatabase:
    Type: String
    Description: Athena database to use for fetch queries.
  AthenaSourceBucket:
    Type: String
    Description: S3 bucket containing source data for Athena queries.
  AthenaETLBucket:
    Type: String
    Description: S3 bucket containing etl data for Athena queries.
  WafArn:
    Type: String
    Description: AWS WAF (Firewall) resource id. Ex arn:aws:wafv2:us-east-1:123456789012:regional/webacl/my-existing-waf/abc12345-d123-ef45-6789-abcdef123456

Resources:
  FhirDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub fhir-sandbox-${Environment}-${AWS::AccountId}

  # Queue to hold incoming build jobs from API Gateway
  FetchQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub fetch-queue-${Environment}
      # VisibilityTimeout should exceed FetchFunction's 900s timeout
      VisibilityTimeout: 960

  # IAM Role allowing API Gateway to put messages into FetchQueue
  ApiGatewaySqsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SQSWritePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt FetchQueue.Arn

  FhirApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Sub ${Environment}
      Auth:
        DefaultAuthorizer: NONE
      EndpointConfiguration:
        Type: REGIONAL
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
      MergeDefinitions: true
      DefinitionBody:
        openapi: '3.0.1'
        paths:
          /{cohort_id}/fhir/build:
            post:
              summary: Async queue ingress for FHIR builds
              parameters:
                - name: cohort_id
                  in: path
                  required: true
                  schema:
                    type: string
              responses:
                '202':
                  description: "Build request accepted"
              x-amazon-apigateway-integration:
                type: "aws"
                httpMethod: "POST"
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:sqs:path/${AWS::AccountId}/${FetchQueue.QueueName}"
                credentials: !GetAtt ApiGatewaySqsRole.Arn
                requestParameters:
                  integration.request.header.Content-Type: "'application/x-www-form-urlencoded'"
                requestTemplates:
                  application/json: "Action=SendMessage&MessageBody=$util.urlEncode(\"{\"\"cohort_id\"\":\"\"$input.params('cohort_id')\"\"}\")"
                passthroughBehavior: "never"
                responses:
                  default:
                    statusCode: "202"
                    responseTemplates:
                      application/json: '{"status": "Accepted", "message": "Build job queued successfully"}'

  FhirApiWafAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}::/restapis/${FhirApi}/stages/${Environment}
      WebACLArn: !Ref WafArn

  FhirFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub fhir-sandbox-${Environment}
      Runtime: python3.14
      Handler: lambda_fn.lambda_handler
      CodeUri: api_src/
      MemorySize: 3600 # This should get us 2 cores
      EphemeralStorage:
        Size: 10240
      Timeout: 30
      Environment:
        Variables:
          SOURCE_BUCKET: !Ref FHIRSourceBucket
          HOME: /tmp/
      Policies:
        - S3ReadPolicy:
            BucketName: !Sub fhir-sandbox-${Environment}-${AWS::AccountId}
        - Statement:
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: '*'
      Events:
        FhirRoute:
          Type: Api
          Properties:
            RestApiId: !Ref FhirApi
            Path: /{cohort_id}/fhir/{fhir_resource}
            Method: POST
        FhirCountRoute:
          Type: Api
          Properties:
            RestApiId: !Ref FhirApi
            Path: /{cohort_id}/fhir/{fhir_resource}/count
            Method: POST

  FetchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub fetch-sandbox-${Environment}
      Runtime: python3.14
      Handler: lambda.lambda_handler
      CodeUri: fetch_data/
      MemorySize: 512
      Timeout: 900
      Environment:
        Variables:
          ATHENA_DATABASE: !Ref AthenaDatabase
          ATHENA_OUTPUT_BUCKET: !Ref FHIRSourceBucket
          ATHENA_SOURCE_BUCKET: !Ref AthenaSourceBucket
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - athena:StartQueryExecution
                - athena:GetQueryExecution
                - athena:GetQueryResults
                - athena:GetTableMetadata
                - athena:GetTable
                - athena:GetDatabase
                - athena:GetPartitions
                - glue:GetDatabase
                - glue:GetTable
                - glue:GetTables
                - glue:GetPartition
                - glue:GetPartitions
                - glue:GetTableVersion
                - glue:GetTableVersions
                # - athena:*
                - kms:Decrypt
                - kms:DescribeKey
                - kms:GenerateDataKey
              Resource: '*'
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:PutObjectAcl
                - s3:ListBucket
                - s3:GetBucketLocation
              Resource:
                - !Sub arn:${AWS::Partition}:s3:::${FHIRSourceBucket}
                - !Sub arn:${AWS::Partition}:s3:::${FHIRSourceBucket}/*
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:ListBucket
              Resource:
                - !Sub arn:${AWS::Partition}:s3:::${AthenaETLBucket}
                - !Sub arn:${AWS::Partition}:s3:::${AthenaETLBucket}/*
                - !Sub arn:${AWS::Partition}:s3:::${AthenaSourceBucket}
                - !Sub arn:${AWS::Partition}:s3:::${AthenaSourceBucket}/*
            - Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
              Resource: !GetAtt FetchQueue.Arn

      Events:
        FetchQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt FetchQueue.Arn
            BatchSize: 1

  ConverterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub fhir-sandbox-${Environment}-converter
      Runtime: python3.14
      Handler: lambda_fn.lambda_handler
      CodeUri: convert_src/
      MemorySize: 3600
      EphemeralStorage:
        Size: 10240
      Timeout: 900
      Environment:
        Variables:
          HOME: /tmp/
      Policies:
        - S3ReadPolicy:
            BucketName: !Sub fhir-sandbox-${Environment}-${AWS::AccountId}
        - S3WritePolicy:
            BucketName: !Sub fhir-sandbox-${Environment}-${AWS::AccountId}
        - Statement:
            - Effect: Allow
              Action:
                - s3:DeleteObject
              Resource: !Sub arn:${AWS::Partition}:s3:::fhir-sandbox-${Environment}-${AWS::AccountId}/*
      Events:
        S3CreateNdjson:
          Type: S3
          Properties:
            Bucket: !Ref FhirDataBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: suffix
                    Value: .ndjson
